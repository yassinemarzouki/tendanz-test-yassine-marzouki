<div class="quote-form-container">
  <h2>Create New Quote</h2>

  <!-- Success message -->
  <div *ngIf="successMessage" class="alert success">
    {{ successMessage }}
  </div>

  <!-- Error message -->
  <div *ngIf="errorMessage" class="alert error">
    {{ errorMessage }}
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form">
    <!-- Client Name -->
    <div class="form-group">
      <label for="clientName">Client Name *</label>
      <input
        type="text"
        id="clientName"
        formControlName="clientName"
        placeholder="Enter client name"
        [class.invalid]="isFieldInvalid('clientName')"
      />
      <div *ngIf="isFieldInvalid('clientName')" class="form-error">
        {{ getErrorMessage('clientName') }}
      </div>
    </div>

    <!-- Product -->
    <div class="form-group">
      <label for="productId">Product *</label>
      <select
        id="productId"
        formControlName="productId"
        [class.invalid]="isFieldInvalid('productId')"
      >
        <option value="">-- Select Product --</option>
        <!-- TODO: Populate with products from API -->
        <option *ngFor="let product of products" [value]="product.id">
          {{ product.name }}
        </option>
      </select>
      <div *ngIf="isFieldInvalid('productId')" class="form-error">
        {{ getErrorMessage('productId') }}
      </div>
    </div>

    <!-- Zone -->
    <div class="form-group">
      <label for="zoneCode">Zone *</label>
      <select
        id="zoneCode"
        formControlName="zoneCode"
        [class.invalid]="isFieldInvalid('zoneCode')"
      >
        <option value="">-- Select Zone --</option>
        <option *ngFor="let zone of zones" [value]="zone.code">
          {{ zone.name }}
        </option>
      </select>
      <div *ngIf="isFieldInvalid('zoneCode')" class="form-error">
        {{ getErrorMessage('zoneCode') }}
      </div>
    </div>

    <!-- Client Age -->
    <div class="form-group">
      <label for="clientAge">Client Age *</label>
      <input
        type="number"
        id="clientAge"
        formControlName="clientAge"
        placeholder="Enter age (18-99)"
        [class.invalid]="isFieldInvalid('clientAge')"
      />
      <div *ngIf="isFieldInvalid('clientAge')" class="form-error">
        {{ getErrorMessage('clientAge') }}
      </div>
    </div>

    <!-- Submit Button -->
    <div class="form-actions">
      <button
        type="submit"
        class="primary"
        [disabled]="loading"
      >
        <span *ngIf="!loading">Calculate Quote</span>
        <span *ngIf="loading" class="loading"></span>
      </button>
      <button type="button" class="secondary" routerLink="/quotes">Cancel</button>
    </div>
  </form>
</div>
